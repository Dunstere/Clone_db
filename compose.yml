services:
  db1:
    image: postgis/postgis:16-3.4
    container_name: db1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gisdb1
    ports:
      - "5432:5432"
      
  db2:
    image: postgis/postgis:16-3.4
    container_name: db2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gisdb2
    ports:
      - "5433:5432"

  geoprocess:
    image: mambaorg/micromamba:latest
    container_name: geoprocess
    volumes:
      - ./data:/data
      - ./scripts:/scripts
    working_dir: /scripts
    command: sleep infinity
